services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
    deploy:
      replicas: 2
    depends_on:
      redis:
        condition: service_healthy
